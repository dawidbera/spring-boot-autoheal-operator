# CI/CD Pipeline for Spring Boot Auto-Heal Operator
# This workflow automates the build, test, and deployment process using GitHub Actions.

name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

# Grant permissions to write to the GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  # Job 1: Build and Test the Java application
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean verify

  # Job 2: Build and Push Docker image (only on push to main or tags)
  docker-publish:
    name: Build and Push Docker Image
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Job 3: Validate Kubernetes Manifests
  k8s-validate:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          for file in k8s/*.yaml; do
            echo "Validating $file"
            # Simple syntax check using python or similar if specialized tools aren't present
            python3 -c 'import yaml, sys; yaml.safe_load(open(sys.argv[1]))' "$file"
          done
